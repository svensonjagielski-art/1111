<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>抽奖管理后台</title>
    <style>
        * {margin: 0;padding: 0;box-sizing: border-box;font-family: "Microsoft YaHei", sans-serif;}
        body {background: #05050d;background-image: radial-gradient(ellipse at top,#2d3748 0%,transparent 60%),radial-gradient(ellipse at bottom,#1a1a2e 0%,#05050d 100%);color: #f5eddc;min-height: 100vh;padding: 20px 15px;}
        .container {max-width: 750px;margin: 0 auto;}
        .login-box {max-width: 450px;margin: 60px auto;background: rgba(255,255,255,0.03);border: 1px solid rgba(240,200,124,0.5);border-radius: 18px;padding: 30px 20px;text-align: center;}
        .login-box h3 {font-size: 20px;color: #f0c87c;margin-bottom: 25px;}
        .login-box input {width: 100%;padding: 14px;background: rgba(255,255,255,0.04);border: 1px solid rgba(240,200,124,0.5);border-radius: 12px;color: #f5eddc;font-size: 16px;outline: none;margin-bottom: 20px;}
        .login-btn {width: 100%;padding: 14px;background: linear-gradient(135deg,#c99e58,#f0c87c);border: none;border-radius: 12px;color: #05050d;font-size: 17px;font-weight: 600;cursor: pointer;}
        .main-wrap {display: none;}
        .title-tip {color: #ccc;font-size: 14px;margin: 8px 0 20px;}
        .input-item {margin-bottom: 15px;}
        .input-item label {display: block;color: #f0c87c;margin-bottom: 4px;font-size: 14px;}
        .input-item input,.input-item textarea {width: 100%;padding: 12px 14px;background: rgba(255,255,255,0.03);border: 1px solid rgba(240,200,124,0.5);border-radius: 10px;color: #f5eddc;outline: none;font-size: 15px;}
        .input-item textarea {min-height: 80px;resize: none;}
        .row {display: flex;gap: 10px;flex-wrap: wrap;}
        .row .input-item {flex: 1;min-width: 180px;}
        .prize-grid {display: grid;grid-template-columns: repeat(3,1fr);gap: 12px;margin: 20px 0;}
        .prize-card {background: rgba(255,255,255,0.02);border: 1px solid rgba(240,200,124,0.4);border-radius: 14px;padding: 12px 8px;text-align: center;}
        .prize-card img {width: 70px;height: 70px;object-fit: cover;margin: 0 auto 8px;}
        .prize-card input {width: 100%;background: transparent;border: none;color: #f0c87c;font-size: 14px;text-align: center;outline: none;}
        .file-input {display: none;}
        .upload-txt {color: #b8a88a;font-size: 12px;cursor: pointer;}
        .save-btn {display: block;width: 80%;max-width: 220px;margin: 20px auto;padding: 13px;background: #28a745;border: none;border-radius: 10px;color: #fff;font-size: 16px;font-weight: 600;cursor: pointer;}
        .oper-bar {display: flex;gap: 10px;flex-wrap: wrap;margin: 20px 0;}
        .oper-bar input,.oper-bar select {flex: 1 1 140px;padding: 12px 14px;background: rgba(255,255,255,0.03);border: 1px solid rgba(240,200,124,0.5);border-radius: 10px;color: #f5eddc;outline: none;}
        .add-btn {padding: 12px 20px;background: linear-gradient(135deg,#c99e58,#f0c87c);border: none;border-radius: 10px;color: #05050d;font-weight: 600;cursor: pointer;}
        table {width: 100%;border-collapse: collapse;font-size: 13px;}
        th,td {border: 1px solid rgba(240,200,124,0.25);padding: 10px 5px;text-align: center;}
        th {background: rgba(240,200,124,0.08);color: #f0c87c;}
        .del-btn {padding: 4px 8px;background: #b93a3a;border: none;border-radius: 4px;color: #fff;cursor: pointer;font-size: 12px;}
    </style>
</head>
<body>
<div class="container">
    <div class="login-box" id="loginBox">
        <h3>管理员登录</h3>
        <input type="password" id="pwd" placeholder="请输入密码">
        <button class="login-btn" onclick="login()">进入后台</button>
    </div>
    <div class="main-wrap" id="mainBox">
        <p class="title-tip">修改内容后点击保存，前台自动同步</p>
        <div class="input-item">
            <label>页面大标题</label>
            <input type="text" id="mainTitle">
        </div>
        <div class="input-item">
            <label>输入框提示文字</label>
            <input type="text" id="inputPlaceholder">
        </div>
        <div class="input-item">
            <label>抽奖按钮文字</label>
            <input type="text" id="drawBtnText">
        </div>
        <div class="row">
            <div class="input-item">
                <label>弹窗标题</label>
                <input type="text" id="modalTitle">
            </div>
            <div class="input-item">
                <label>领取按钮文字</label>
                <input type="text" id="linkBtnText">
            </div>
            <div class="input-item">
                <label>关闭按钮文字</label>
                <input type="text" id="closeBtnText">
            </div>
        </div>
        <div class="input-item">
            <label>活动说明</label>
            <textarea id="desc"></textarea>
        </div>
        <div class="input-item">
            <label>跳转链接</label>
            <input type="text" id="jumpUrl">
        </div>
        <h3 style="margin:20px 0 10px;color:#f0c87c">奖品设置</h3>
        <div class="prize-grid">
            <div class="prize-card"><img id="img1"><input type="text" id="name1"><label class="upload-txt">上传图片<input class="file-input" type="file" accept="image/*" onchange="upImg(1,this)"></label></div>
            <div class="prize-card"><img id="img2"><input type="text" id="name2"><label class="upload-txt">上传图片<input class="file-input" type="file" accept="image/*" onchange="upImg(2,this)"></label></div>
            <div class="prize-card"><img id="img3"><input type="text" id="name3"><label class="upload-txt">上传图片<input class="file-input" type="file" accept="image/*" onchange="upImg(3,this)"></label></div>
            <div class="prize-card"><img id="img4"><input type="text" id="name4"><label class="upload-txt">上传图片<input class="file-input" type="file" accept="image/*" onchange="upImg(4,this)"></label></div>
            <div class="prize-card"><img id="img5"><input type="text" id="name5"><label class="upload-txt">上传图片<input class="file-input" type="file" accept="image/*" onchange="upImg(5,this)"></label></div>
            <div class="prize-card"><img id="img6"><input type="text" id="name6"><label class="upload-txt">上传图片<input class="file-input" type="file" accept="image/*" onchange="upImg(6,this)"></label></div>
        </div>
        <button class="save-btn" onclick="saveAll()">💾 保存全部设置</button>
        <div class="oper-bar">
            <input type="text" id="newCode" placeholder="新增抽奖码">
            <select id="bindPrize"></select>
            <button class="add-btn" onclick="addCode()">添加</button>
        </div>
        <table>
            <thead><tr><th>抽奖码</th><th>对应奖品</th><th>状态</th><th>操作</th></tr></thead>
            <tbody id="codeTable"></tbody>
        </table>
    </div>
</div>

<script>
// ========== 在这里改成你的 Worker 域名 ==========
const API_HOST =  "fragrant-unit-d920.svensonjagielski.workers.dev";
const ADMIN_PWD = "123456";
let pageConfig = {}, prizeList = [], codeData = [];

async function loadConfig(){
    let res = await fetch(`${API_HOST}/getConfig`);
    let data = await res.json();
    pageConfig = data.pageConfig;
    prizeList = data.prizeList;
    codeData = data.codeData;

    document.getElementById("mainTitle").value = pageConfig.mainTitle;
    document.getElementById("inputPlaceholder").value = pageConfig.inputPlaceholder;
    document.getElementById("drawBtnText").value = pageConfig.drawBtnText;
    document.getElementById("desc").value = pageConfig.desc;
    document.getElementById("modalTitle").value = pageConfig.modalTitle;
    document.getElementById("linkBtnText").value = pageConfig.linkBtnText;
    document.getElementById("closeBtnText").value = pageConfig.closeBtnText;
    document.getElementById("jumpUrl").value = pageConfig.jumpUrl;

    for(let i=1;i<=6;i++){
        document.getElementById("name"+i).value = prizeList[i-1].name;
        document.getElementById("img"+i).src = prizeList[i-1].img;
    }
    refreshSelect();
    renderCodeTable();
}

async function saveAll(){
    pageConfig.mainTitle = document.getElementById("mainTitle").value.trim();
    pageConfig.inputPlaceholder = document.getElementById("inputPlaceholder").value.trim();
    pageConfig.drawBtnText = document.getElementById("drawBtnText").value.trim();
    pageConfig.desc = document.getElementById("desc").value.trim();
    pageConfig.modalTitle = document.getElementById("modalTitle").value.trim();
    pageConfig.linkBtnText = document.getElementById("linkBtnText").value.trim();
    pageConfig.closeBtnText = document.getElementById("closeBtnText").value.trim();
    pageConfig.jumpUrl = document.getElementById("jumpUrl").value.trim();

    for(let i=1;i<=6;i++){
        prizeList[i-1].name = document.getElementById("name"+i).value.trim();
    }

    let post = await fetch(`${API_HOST}/saveConfig`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({pageConfig,prizeList,codeData})
    });
    let ret = await post.json();
    if(ret.ok) alert("✅ 保存成功！前台刷新即可");
    else alert("❌ 保存失败");
}

function upImg(num,dom){
    let file = dom.files[0];
    if(!file) return;
    let r = new FileReader();
    r.onload = e=>{
        prizeList[num-1].img = e.target.result;
        document.getElementById("img"+num).src = e.target.result;
    };
    r.readAsDataURL(file);
}

function login(){
    let pwd = document.getElementById("pwd").value.trim();
    if(pwd !== ADMIN_PWD) return alert("密码错误");
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("mainBox").style.display = "block";
    loadConfig();
}

function refreshSelect(){
    let sel = document.getElementById("bindPrize");
    sel.innerHTML = "";
    prizeList.forEach(it=>{
        let opt = document.createElement("option");
        opt.value = it.id;
        opt.innerText = it.name;
        sel.appendChild(opt);
    });
}

function addCode(){
    let code = document.getElementById("newCode").value.trim();
    let pid = +document.getElementById("bindPrize").value;
    if(!code) return alert("请填写抽奖码");
    if(codeData.find(x=>x.code===code)) return alert("抽奖码已存在");
    codeData.push({code,prizeId:pid,used:false});
    document.getElementById("newCode").value = "";
    renderCodeTable();
}

function delCode(idx){
    if(confirm("确定删除？")){
        codeData.splice(idx,1);
        renderCodeTable();
    }
}

function renderCodeTable(){
    let tb = document.getElementById("codeTable");
    tb.innerHTML = "";
    codeData.forEach((item,idx)=>{
        let p = prizeList.find(x=>x.id === item.prizeId);
        let st = item.used ? "已使用" : "未使用";
        tb.innerHTML += `<tr><td>${item.code}</td><td>${p.name}</td><td>${st}</td><td><button class="del-btn" onclick="delCode(${idx})">删除</button></td></tr>`;
    });
}
</script>
</body>
</html>
