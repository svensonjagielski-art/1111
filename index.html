<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>抽奖活动</title>
    <style>
        * {margin: 0;padding: 0;box-sizing: border-box;font-family: "Microsoft YaHei", sans-serif;}
        body {background: #05050d;background-image: radial-gradient(ellipse at top,#2d3748 0%,transparent 60%),radial-gradient(ellipse at bottom,#1a1a2e 0%,#05050d 100%);color: #f5eddc;min-height: 100vh;padding: 30px 15px;}
        .wrap {max-width: 600px;margin: 0 auto;text-align: center;}
        h1 {color: #f0c87c;margin-bottom: 30px;font-size: 28px;}
        .prize-grid {display: grid;grid-template-columns: repeat(3, 1fr);gap: 12px;margin: 20px 0 30px;}
        .prize-card {background: rgba(255,255,255,0.02);border: 1px solid rgba(240,200,124,0.4);border-radius: 14px;padding: 12px 8px;text-align: center;}
        .prize-card img {width: 70px;height: 70px;object-fit: cover;margin: 0 auto 8px;}
        .prize-card p {color: #f0c87c;font-size: 14px;}
        .input-box {margin-bottom: 20px;}
        #codeInput {width: 100%;max-width: 400px;padding: 14px;background: rgba(255,255,255,0.03);border: 1px solid rgba(240,200,124,0.5);border-radius: 10px;color: #f5eddc;font-size: 16px;outline: none;}
        #drawBtn {padding: 14px 40px;margin: 15px 0;background: linear-gradient(135deg,#c99e58,#f0c87c);border: none;border-radius: 10px;color: #05050d;font-size: 17px;font-weight: 600;cursor: pointer;}
        .desc {color: #ccc;line-height: 1.8;margin-top: 20px;white-space: pre-line;}
        .mask {position: fixed;top: 0;left: 0;width: 100%;height: 100%;background: rgba(0,0,0,0.7);display: none;align-items: center;justify-content: center;}
        .pop {background: #111;border: 1px solid rgba(240,200,124,0.5);border-radius: 14px;padding: 30px 20px;text-align: center;min-width: 280px;}
        .pop h3 {color: #f0c87c;margin-bottom: 20px;}
        .pop-btn {margin: 8px;padding: 10px 20px;border: none;border-radius: 8px;cursor: pointer;font-size: 15px;}
        #getBtn {background: #28a745;color: #fff;}
        #closePop {background: #666;color: #fff;}
    </style>
</head>
<body>
<div class="wrap">
    <h1 id="title"></h1>
    <div class="prize-grid">
        <div class="prize-card"><img id="fImg1"><p id="fName1"></p></div>
        <div class="prize-card"><img id="fImg2"><p id="fName2"></p></div>
        <div class="prize-card"><img id="fImg3"><p id="fName3"></p></div>
        <div class="prize-card"><img id="fImg4"><p id="fName4"></p></div>
        <div class="prize-card"><img id="fImg5"><p id="fName5"></p></div>
        <div class="prize-card"><img id="fImg6"><p id="fName6"></p></div>
    </div>
    <div class="input-box">
        <input type="text" id="codeInput" placeholder="">
    </div>
    <button id="drawBtn"></button>
    <div class="desc" id="activityDesc"></div>
</div>

<div class="mask" id="mask">
    <div class="pop">
        <h3 id="popTitle"></h3>
        <p id="prizeName"></p>
        <div style="margin-top:20px">
            <button class="pop-btn" id="getBtn"></button>
            <button class="pop-btn" id="closePop"></button>
        </div>
    </div>
</div>

<script>
// ========== 在这里改成你的 Worker 域名 ==========
const API_HOST = "fragrant-unit-d920.svensonjagielski.workers.dev";
let pageConfig = [], prizeList = [], codeData = [];

async function init(){
    let res = await fetch(`${API_HOST}/getConfig`);
    let data = await res.json();
    pageConfig = data.pageConfig;
    prizeList = data.prizeList;
    codeData = data.codeData;

    document.getElementById("title").innerText = pageConfig.mainTitle;
    document.getElementById("codeInput").placeholder = pageConfig.inputPlaceholder;
    document.getElementById("drawBtn").innerText = pageConfig.drawBtnText;
    document.getElementById("activityDesc").innerText = pageConfig.desc;
    document.getElementById("popTitle").innerText = pageConfig.modalTitle;
    document.getElementById("getBtn").innerText = pageConfig.linkBtnText;
    document.getElementById("closePop").innerText = pageConfig.closeBtnText;

    for(let i=1;i<=6;i++){
        document.getElementById("fName"+i).innerText = prizeList[i-1].name;
        document.getElementById("fImg"+i).src = prizeList[i-1].img;
    }

    document.getElementById("closePop").onclick = ()=>mask.style.display="none";
    document.getElementById("getBtn").onclick = ()=>{
        if(pageConfig.jumpUrl) window.open(pageConfig.jumpUrl,"_blank");
    };
    document.getElementById("drawBtn").onclick = doDraw;
}

async function doDraw(){
    let code = document.getElementById("codeInput").value.trim();
    if(!code) return alert("请输入抽奖码");
    let item = codeData.find(x=>x.code === code);
    if(!item) return alert("抽奖码不存在");
    if(item.used) return alert("该抽奖码已使用");

    item.used = true;
    let prize = prizeList.find(p=>p.id === item.prizeId);
    document.getElementById("prizeName").innerText = "恭喜获得："+prize.name;
    mask.style.display = "flex";

    await fetch(`${API_HOST}/saveConfig`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({pageConfig,prizeList,codeData})
    });
}
init();
</script>
</body>
</html>
